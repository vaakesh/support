services:
  api:
    container_name: support-api-test
    env_file:
      - ./backend/.env.test
    volumes:
      - ./backend/pytest.ini:/backend/pytest.ini
    
  postgres:
    container_name: support-postgres-test
    environment:
      POSTGRES_DB: support_test
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d support_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
  
  redis:
    container_name: support-redis-test
    volumes:
      - redis_data_test:/data


volumes:
  pgdata_test:
  redis_data_test: