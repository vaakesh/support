services:
  api:
    container_name: support-api
    build:
      context: backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/alembic:/backend/alembic
      - ./backend/app:/backend/app
      - ./backend/.python-version:/backend/.python-version
      - ./backend/alembic.ini:/backend/alembic.ini
      - ./backend/pyproject.toml:/backend/pyproject.toml
      - ./backend/certs:/backend/certs
      - ./backend/uv.lock:/backend/uv.lock
      - ./backend/entrypoint.sh:/backend/entrypoint.sh
      - ./backend/tests:/backend/tests
    restart: on-failure:10
  
  postgres:
    image: postgres:16
    container_name: support-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: support
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d support"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: support-cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      - postgres
  
  frontend:
    container_name: support-frontend
    build:
      context: frontend
      dockerfile: Dockerfile
    environment:
      VITE_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

  redis:
    image: redis:7-alpine
    container_name: support-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  redisinsight:
    image: redis/redisinsight:latest
    container_name: support-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight:/data

volumes:
  pgdata:
  cloudbeaver_data:
  redis_data:
  redisinsight: